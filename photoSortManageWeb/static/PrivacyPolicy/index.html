<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoSort Privacy Policy</title>
  <script>
    const lang = (navigator.language || navigator.userLanguage || "").toLowerCase();
    const suffix = location.hash || "";
    location.replace((lang.startsWith("zh") ? "./zh.html" : "./en.html") + suffix);
  </script>
</head>
<body>
  <p><a href="./zh.html">中文</a> / <a href="./en.html">English</a></p>
</body>
</html>
